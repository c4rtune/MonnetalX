name: "MonnetalX"
description: "AI-powered Pull Request link analyzer that extracts, ranks, summarizes, and comments relevant links directly on GitHub PRs."
author: "MonnetalX"

branding:
  icon: "search"
  color: "blue"

inputs:
  github_token:
    description: "Token used to read repository data and post PR comments."
    required: true

  deepseek_api_key:
    description: "API key used for AI summarization."
    required: true

runs:
  using: "composite"

  steps:
    # Checkout CALLER repository (the repo using MonnetalX)
    - name: Checkout target repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        token: ${{ inputs.github_token }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: monnetalx-pip-${{ runner.os }}-${{ github.action_ref }}
        restore-keys: |
          monnetalx-pip-${{ runner.os }}-

    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: monnetalx-hf-${{ runner.os }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install requests beautifulsoup4 python-dotenv openai lightgbm sentence-transformers PyGithub numpy pandas
        fi

    - name: Run MonnetalX
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        PYTHONPATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python -m app.scripts.pr_comment
